<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fashion Zone</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f8f8;
}

header{
    background:#ff4081;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    margin:0;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    width:220px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px #ccc;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

button{
    background:#ff4081;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
}
</style>

</head>

<body>

<header>
<h1>Fashion Zone</h1>
<p>Latest Fashion Collection</p>
</header>


<div class="products">

<div class="card">
<img src="https://via.placeholder.com/220x250" alt="Kurti">
<h3>Stylish Kurti</h3>
<p>₹699</p>
<button>Buy Now</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/220x250" alt="Saree">
<h3>Beautiful Saree</h3>
<p>₹999</p>
<button>Buy Now</button>
</div>


<div class="card">
<img src="https://via.placeholder.com/220x250" alt="Handbag">
<h3>Fashion Handbag</h3>
<p>₹499</p>
<button>Buy Now</button>
</div>

</div>

</body>
  </html>
